<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>作品分享区</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Helvetica Neue", Arial, "PingFang TC", "Microsoft JhengHei", sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding-bottom: 60px;
    }

    /* ── Config banner ── */
    #config-banner {
      background: #ff6b6b;
      color: #fff;
      text-align: center;
      padding: 12px 20px;
      font-size: 0.9rem;
      display: none;
    }
    #config-banner a { color: #fff; font-weight: 700; }

    /* ── Header ── */
    header {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.25);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-left h1 { color: #fff; font-size: 1.5rem; font-weight: 700; letter-spacing: 0.04em; }
    .header-left p  { color: rgba(255,255,255,0.75); font-size: 0.85rem; margin-top: 2px; }

    .header-right { display: flex; align-items: center; gap: 10px; }

    .btn {
      border: none; border-radius: 50px; padding: 10px 20px;
      font-size: 0.9rem; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn:active { transform: translateY(0); }

    .btn-primary { background: #fff; color: #764ba2; box-shadow: 0 4px 14px rgba(0,0,0,0.15); }
    .btn-primary:hover { box-shadow: 0 6px 18px rgba(0,0,0,0.2); }

    .btn-admin {
      background: rgba(255,255,255,0.2);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.4);
      padding: 9px 16px;
      font-size: 0.82rem;
    }
    .btn-admin.active { background: #ff6b6b; border-color: #ff6b6b; }

    /* ── Live indicator ── */
    .live-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #2ecc71; display: inline-block;
      box-shadow: 0 0 6px #2ecc71;
      animation: pulse 1.8s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .live-label { color: rgba(255,255,255,0.8); font-size: 0.78rem; display: flex; align-items: center; gap: 5px; }

    /* ── Grid ── */
    #board {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 20px;
      padding: 28px 32px;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* ── Card ── */
    .card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
      transition: transform 0.2s, box-shadow 0.2s;
      animation: cardIn 0.35s ease;
    }
    @keyframes cardIn {
      from { transform: scale(0.92); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }
    .card:hover { transform: translateY(-4px); box-shadow: 0 8px 28px rgba(0,0,0,0.18); }

    .card-delete {
      position: absolute; top: 8px; right: 8px;
      background: rgba(0,0,0,0.45); color: #fff;
      border: none; border-radius: 50%; width: 28px; height: 28px;
      font-size: 14px; cursor: pointer; display: none;
      align-items: center; justify-content: center; z-index: 10;
      transition: background 0.15s;
    }
    .admin-mode .card:hover .card-delete { display: flex; }
    .card-delete:hover { background: rgba(220,50,50,0.8); }

    /* Uploader badge */
    .uploader-badge {
      position: absolute; top: 8px; left: 8px;
      background: rgba(0,0,0,0.45); color: #fff;
      border-radius: 20px; padding: 3px 10px;
      font-size: 0.72rem; font-weight: 600; z-index: 5;
      max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    /* Image card */
    .card-image img {
      width: 100%; height: 200px; object-fit: cover;
      display: block; cursor: zoom-in;
    }
    .card-image .card-caption { padding: 12px 14px; font-size: 0.88rem; color: #444; word-break: break-word; }

    /* PDF card */
    .card-pdf .pdf-icon {
      height: 140px;
      background: linear-gradient(135deg, #ff6b6b, #ee5a24);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 8px; color: #fff; cursor: pointer;
    }
    .card-pdf .pdf-icon svg { width: 48px; height: 48px; opacity: 0.95; }
    .card-pdf .pdf-icon span { font-size: 0.75rem; opacity: 0.85; }
    .card-pdf .card-body { padding: 14px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .card-pdf .card-title { font-weight: 600; font-size: 0.92rem; color: #222; word-break: break-word; }
    .card-pdf .card-subtitle { font-size: 0.8rem; color: #888; }
    .open-btn {
      margin-top: auto; display: inline-block;
      background: #ee5a24; color: #fff; text-decoration: none;
      border-radius: 6px; padding: 7px 14px; font-size: 0.82rem; font-weight: 600;
      text-align: center; transition: background 0.15s; cursor: pointer; border: none; width: 100%;
    }
    .open-btn:hover { opacity: 0.85; }
    .open-btn.link-btn { background: #44a08d; }

    /* Link card */
    .card-link .link-thumb {
      height: 130px;
      background: linear-gradient(135deg, #4ecdc4, #44a08d);
      display: flex; align-items: center; justify-content: center;
    }
    .card-link .link-icon { color: #fff; display: flex; flex-direction: column; align-items: center; gap: 8px; font-size: 0.75rem; opacity: 0.9; }
    .card-link .link-icon svg { width: 42px; height: 42px; }
    .card-link .card-body { padding: 14px; flex: 1; display: flex; flex-direction: column; gap: 6px; }
    .card-link .card-title { font-weight: 600; font-size: 0.92rem; color: #222; word-break: break-word; }
    .card-link .card-url { font-size: 0.75rem; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-link .card-desc { font-size: 0.82rem; color: #666; word-break: break-word; }

    /* Empty / loading */
    #empty {
      grid-column: 1 / -1; text-align: center;
      padding: 80px 20px; color: rgba(255,255,255,0.7);
    }
    #empty svg { width: 64px; height: 64px; margin-bottom: 16px; opacity: 0.6; }
    #empty p { font-size: 1rem; }

    /* ── Modal ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); z-index: 500;
      align-items: center; justify-content: center;
      padding: 16px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff; border-radius: 18px; padding: 28px;
      width: 420px; max-width: 100%; max-height: 90vh; overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      position: relative; animation: slideUp 0.25s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .modal-close { position: absolute; top: 14px; right: 16px; background: none; border: none; font-size: 22px; cursor: pointer; color: #888; }
    .modal h2 { font-size: 1.15rem; color: #222; margin-bottom: 20px; }

    .type-btns { display: flex; gap: 10px; margin-bottom: 20px; }
    .type-btn {
      flex: 1; border: 2px solid #e0e0e0; border-radius: 10px; padding: 12px 6px;
      background: #fff; cursor: pointer; display: flex; flex-direction: column;
      align-items: center; gap: 6px; font-size: 0.8rem; color: #555;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
    }
    .type-btn svg { width: 26px; height: 26px; }
    .type-btn.active, .type-btn:hover { border-color: #764ba2; background: #f5eeff; color: #764ba2; }

    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: 0.83rem; font-weight: 600; color: #444; margin-bottom: 5px; }
    input[type="text"], input[type="url"], textarea {
      width: 100%; border: 1.5px solid #ddd; border-radius: 8px;
      padding: 9px 12px; font-size: 0.88rem; color: #333; outline: none;
      transition: border-color 0.15s; font-family: inherit;
    }
    input:focus, textarea:focus { border-color: #764ba2; }
    textarea { resize: vertical; min-height: 65px; }

    .file-drop {
      border: 2px dashed #ccc; border-radius: 10px; padding: 24px 16px;
      text-align: center; cursor: pointer; transition: border-color 0.15s, background 0.15s;
      color: #888; font-size: 0.85rem; position: relative;
    }
    .file-drop:hover, .file-drop.dragover { border-color: #764ba2; background: #f5eeff; color: #764ba2; }
    .file-drop input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .file-drop svg { width: 28px; height: 28px; display: block; margin: 0 auto 8px; }
    .file-name { margin-top: 8px; font-size: 0.78rem; color: #764ba2; font-weight: 600; word-break: break-all; }

    .submit-btn {
      width: 100%; background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff; border: none; border-radius: 10px; padding: 12px;
      font-size: 0.92rem; font-weight: 700; cursor: pointer; margin-top: 6px;
      transition: opacity 0.15s; font-family: inherit;
    }
    .submit-btn:hover { opacity: 0.9; }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Progress */
    .progress-wrap { margin-top: 10px; display: none; }
    .progress-track { background: #eee; border-radius: 4px; height: 6px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #667eea, #764ba2); width: 0; transition: width 0.4s; }
    .progress-label { font-size: 0.78rem; color: #888; margin-top: 4px; text-align: center; }

    /* Admin modal */
    #admin-modal .modal { width: 340px; }

    /* PDF overlay */
    .pdf-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 600; flex-direction: column; }
    .pdf-overlay.open { display: flex; }
    .pdf-header { background: #1a1a2e; color: #fff; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; }
    .pdf-header span { font-size: 0.9rem; font-weight: 600; }
    .pdf-header button { background: none; border: none; color: #fff; font-size: 1.5rem; cursor: pointer; line-height: 1; }
    .pdf-overlay iframe { flex: 1; border: none; }

    /* Lightbox */
    .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 600; align-items: center; justify-content: center; cursor: zoom-out; }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 92vw; max-height: 92vh; border-radius: 6px; box-shadow: 0 0 60px rgba(0,0,0,0.5); }
    .lightbox button { position: absolute; top: 16px; right: 20px; color: #fff; font-size: 2rem; cursor: pointer; background: none; border: none; line-height: 1; }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1a1a2e; color: #fff; padding: 11px 22px;
      border-radius: 8px; font-size: 0.88rem; z-index: 999;
      transition: transform 0.3s; pointer-events: none; white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    @media (max-width: 600px) {
      header { padding: 12px 14px; flex-wrap: wrap; gap: 10px; }
      .header-left h1 { font-size: 1.1rem; }
      #board { padding: 14px; gap: 12px; }
      .modal { padding: 22px 16px; }
    }
  </style>
</head>
<body>

<!-- Config missing banner -->
<div id="config-banner">
  ⚠️ 请先完成 Supabase 设定，详见
  <a href="https://github.com/vwen123/zuopin-fenxiang#setup" target="_blank">设定说明</a>
</div>

<!-- Header -->
<header>
  <div class="header-left">
    <h1>✨ 作品分享区</h1>
    <p>分享你的讲义、资讯图、简报与连结</p>
  </div>
  <div class="header-right">
    <div class="live-label"><span class="live-dot"></span> 实时同步</div>
    <button class="btn btn-admin" id="admin-toggle" onclick="toggleAdmin()">🔒 管理员</button>
    <button class="btn btn-primary" onclick="openModal()">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
      上传作品
    </button>
  </div>
</header>

<!-- Board -->
<div id="board">
  <div id="empty">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
    <p>载入中…</p>
  </div>
</div>

<!-- Upload Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">×</button>
    <h2>上传作品</h2>

    <div class="form-group">
      <label>你的名字</label>
      <input type="text" id="uploader-name" placeholder="请输入你的名字…" />
    </div>

    <div class="type-btns">
      <button class="type-btn active" id="btn-image" onclick="setType('image')">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path stroke-linecap="round" stroke-linejoin="round" d="M21 15l-5-5L5 21"/></svg>
        图片
      </button>
      <button class="type-btn" id="btn-pdf" onclick="setType('pdf')">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M7 21h10a2 2 0 002-2V9l-5-6H7a2 2 0 00-2 2v14a2 2 0 002 2z"/><path stroke-linecap="round" stroke-linejoin="round" d="M14 3v5a1 1 0 001 1h5"/></svg>
        PDF
      </button>
      <button class="type-btn" id="btn-link" onclick="setType('link')">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/></svg>
        连结
      </button>
    </div>

    <!-- Image -->
    <div id="form-image">
      <div class="form-group">
        <label>选择图片</label>
        <div class="file-drop" id="img-drop">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
          点击或拖曳图片
          <input type="file" id="img-file" accept="image/*" onchange="onFileSelect(this,'img')">
        </div>
        <div class="file-name" id="img-filename"></div>
      </div>
      <div class="form-group">
        <label>说明（选填）</label>
        <input type="text" id="img-caption" placeholder="说明文字…" />
      </div>
    </div>

    <!-- PDF -->
    <div id="form-pdf" style="display:none">
      <div class="form-group">
        <label>选择 PDF</label>
        <div class="file-drop" id="pdf-drop">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
          点击或拖曳 PDF
          <input type="file" id="pdf-file" accept=".pdf,.PDF" onchange="onFileSelect(this,'pdf')">
        </div>
        <div class="file-name" id="pdf-filename"></div>
      </div>
      <div class="form-group">
        <label>标题（选填）</label>
        <input type="text" id="pdf-title" placeholder="标题…" />
      </div>
      <div class="form-group">
        <label>说明（选填）</label>
        <input type="text" id="pdf-desc" placeholder="简短说明…" />
      </div>
    </div>

    <!-- Link -->
    <div id="form-link" style="display:none">
      <div class="form-group">
        <label>网址</label>
        <input type="url" id="link-url" placeholder="https://…" />
      </div>
      <div class="form-group">
        <label>标题</label>
        <input type="text" id="link-title" placeholder="标题…" />
      </div>
      <div class="form-group">
        <label>说明（选填）</label>
        <textarea id="link-desc" placeholder="简短说明…"></textarea>
      </div>
    </div>

    <div class="progress-wrap" id="progress-wrap">
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="progress-label" id="progress-label">上传中…</div>
    </div>

    <button class="submit-btn" id="submit-btn" onclick="submitCard()">上传</button>
  </div>
</div>

<!-- Admin modal -->
<div class="modal-overlay" id="admin-modal">
  <div class="modal" style="width:320px">
    <button class="modal-close" onclick="closeAdminModal()">×</button>
    <h2>🔐 管理员登入</h2>
    <div class="form-group" style="margin-top:8px">
      <label>管理员密码</label>
      <input type="password" id="admin-pw" placeholder="请输入密码…"
             onkeydown="if(event.key==='Enter')checkAdmin()" />
    </div>
    <button class="submit-btn" onclick="checkAdmin()">确认</button>
    <div id="admin-error" style="color:#e74c3c;font-size:0.82rem;margin-top:8px;display:none">密码错误</div>
  </div>
</div>

<!-- PDF overlay -->
<div class="pdf-overlay" id="pdf-overlay">
  <div class="pdf-header">
    <span id="pdf-title-bar">PDF 预览</span>
    <button onclick="closePdf()">×</button>
  </div>
  <iframe id="pdf-frame" src=""></iframe>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button onclick="closeLightbox()">×</button>
  <img id="lb-img" src="" alt="" />
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════════════════════════
//  ⚙️  CONFIGURATION — 请填入你的 Supabase 资讯
// ════════════════════════════════════════════════════════════
const SUPABASE_URL      = 'YOUR_SUPABASE_URL';
const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
const ADMIN_PASSWORD    = 'YOUR_ADMIN_PASSWORD';   // 老师的删除密码
// ════════════════════════════════════════════════════════════

const BUCKET = 'uploads';
let sb, isAdmin = false, currentType = 'image';

// ── Init ──────────────────────────────────────────────────────
function isConfigured() {
  return SUPABASE_URL !== 'YOUR_SUPABASE_URL' &&
         SUPABASE_ANON_KEY !== 'YOUR_SUPABASE_ANON_KEY';
}

async function init() {
  if (!isConfigured()) {
    document.getElementById('config-banner').style.display = 'block';
    showEmpty('请先完成 Supabase 设定（见 SETUP.md）');
    return;
  }

  sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  await loadCards();
  subscribeRealtime();
}

// ── Load cards ────────────────────────────────────────────────
async function loadCards() {
  const { data, error } = await sb
    .from('cards')
    .select('*')
    .order('created_at', { ascending: false });

  if (error) { showEmpty('载入失败：' + error.message); return; }
  renderBoard(data || []);
}

// ── Realtime ──────────────────────────────────────────────────
function subscribeRealtime() {
  sb.channel('cards-channel')
    .on('postgres_changes',
        { event: '*', schema: 'public', table: 'cards' },
        () => loadCards())
    .subscribe();
}

// ── Render ────────────────────────────────────────────────────
function renderBoard(cards) {
  const board = document.getElementById('board');
  board.innerHTML = '';

  if (cards.length === 0) {
    showEmpty('还没有作品，点击「上传作品」开始吧！');
    return;
  }

  cards.forEach(c => {
    const div = document.createElement('div');
    div.className = 'card card-' + c.type;
    div.dataset.id = c.id;

    const badge = c.uploader
      ? `<div class="uploader-badge">${esc(c.uploader)}</div>`
      : '';

    const delBtn = `<button class="card-delete" onclick="deleteCard(${c.id}, '${esc(c.src || '')}')">×</button>`;

    if (c.type === 'image') {
      div.innerHTML = `
        ${badge}
        <img src="${esc(c.src)}" loading="lazy" onclick="openLightbox('${esc(c.src)}')">
        ${c.caption ? `<div class="card-caption">${esc(c.caption)}</div>` : ''}
        ${delBtn}`;

    } else if (c.type === 'pdf') {
      div.innerHTML = `
        ${badge}
        <div class="pdf-icon" onclick="openPdf('${esc(c.src)}','${esc(c.title)}')">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M7 21h10a2 2 0 002-2V9l-5-6H7a2 2 0 00-2 2v14a2 2 0 002 2z"/><path stroke-linecap="round" stroke-linejoin="round" d="M14 3v5a1 1 0 001 1h5"/></svg>
          <span>点击预览</span>
        </div>
        <div class="card-body">
          <div class="card-title">${esc(c.title)}</div>
          ${c.desc ? `<div class="card-subtitle">${esc(c.desc)}</div>` : ''}
          <a class="open-btn" href="${esc(c.src)}" download="${esc(c.name)}">⬇ 下载 PDF</a>
        </div>
        ${delBtn}`;

    } else {
      div.innerHTML = `
        ${badge}
        <div class="link-thumb">
          <div class="link-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/></svg>
            连结
          </div>
        </div>
        <div class="card-body">
          <div class="card-title">${esc(c.title)}</div>
          <div class="card-url">${esc(c.url)}</div>
          ${c.desc ? `<div class="card-desc">${esc(c.desc)}</div>` : ''}
          <a class="open-btn link-btn" href="${esc(c.url)}" target="_blank" rel="noopener">开启连结 →</a>
        </div>
        ${delBtn}`;
    }

    board.appendChild(div);
  });
}

function showEmpty(msg) {
  document.getElementById('board').innerHTML = `<div id="empty">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
    <p>${msg}</p>
  </div>`;
}

// ── Upload ────────────────────────────────────────────────────
let currentType_ = 'image';

function setType(t) {
  currentType_ = t;
  ['image','pdf','link'].forEach(x => {
    document.getElementById('btn-' + x).classList.toggle('active', x === t);
    document.getElementById('form-' + x).style.display = x === t ? 'block' : 'none';
  });
}

function onFileSelect(input, kind) {
  const file = input.files[0]; if (!file) return;
  document.getElementById(kind + '-filename').textContent = '✓ ' + file.name;
  if (kind === 'pdf' && !document.getElementById('pdf-title').value)
    document.getElementById('pdf-title').value = file.name.replace(/\.pdf$/i, '');
}

function setProgress(pct, label) {
  document.getElementById('progress-wrap').style.display = 'block';
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = label;
}

async function submitCard() {
  if (!isConfigured()) { showToast('请先完成 Supabase 设定'); return; }

  const uploader = document.getElementById('uploader-name').value.trim();
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;

  try {
    let card = { type: currentType_, uploader };

    if (currentType_ === 'image') {
      const file = document.getElementById('img-file').files[0];
      if (!file) { showToast('请选择图片'); return; }
      setProgress(20, '上传图片中…');
      const path = `${Date.now()}_${file.name}`;
      const { error: upErr } = await sb.storage.from(BUCKET).upload(path, file);
      if (upErr) throw upErr;
      const { data: urlData } = sb.storage.from(BUCKET).getPublicUrl(path);
      setProgress(70, '储存资料中…');
      card.src     = urlData.publicUrl;
      card.caption = document.getElementById('img-caption').value.trim();

    } else if (currentType_ === 'pdf') {
      const file = document.getElementById('pdf-file').files[0];
      if (!file) { showToast('请选择 PDF'); return; }
      setProgress(20, '上传 PDF 中…');
      const path = `${Date.now()}_${file.name}`;
      const { error: upErr } = await sb.storage.from(BUCKET).upload(path, file, { contentType: 'application/pdf' });
      if (upErr) throw upErr;
      const { data: urlData } = sb.storage.from(BUCKET).getPublicUrl(path);
      setProgress(70, '储存资料中…');
      card.src   = urlData.publicUrl;
      card.name  = file.name;
      card.title = document.getElementById('pdf-title').value.trim() || file.name.replace(/\.pdf$/i,'');
      card.desc  = document.getElementById('pdf-desc').value.trim();

    } else {
      const url   = document.getElementById('link-url').value.trim();
      const title = document.getElementById('link-title').value.trim();
      if (!url)   { showToast('请输入网址'); return; }
      if (!title) { showToast('请输入标题'); return; }
      setProgress(50, '储存中…');
      card.url  = url;
      card.title= title;
      card.desc = document.getElementById('link-desc').value.trim();
    }

    const { error: dbErr } = await sb.from('cards').insert([card]);
    if (dbErr) throw dbErr;

    setProgress(100, '完成！');
    showToast('上传成功！');
    setTimeout(() => { closeModal(); }, 600);

  } catch (e) {
    console.error(e);
    showToast('上传失败：' + (e.message || e));
  } finally {
    btn.disabled = false;
    document.getElementById('progress-wrap').style.display = 'none';
    document.getElementById('progress-fill').style.width = '0';
  }
}

// ── Delete ────────────────────────────────────────────────────
async function deleteCard(id, src) {
  if (!isAdmin) return;
  if (!confirm('确定要删除这个作品吗？')) return;

  // Delete file from storage if it's in our bucket
  if (src && src.includes('/storage/v1/object/public/uploads/')) {
    const path = src.split('/storage/v1/object/public/uploads/')[1];
    await sb.storage.from(BUCKET).remove([path]);
  }

  const { error } = await sb.from('cards').delete().eq('id', id);
  if (error) showToast('删除失败：' + error.message);
  else showToast('已删除');
}

// ── Admin ─────────────────────────────────────────────────────
function toggleAdmin() {
  if (isAdmin) {
    isAdmin = false;
    document.body.classList.remove('admin-mode');
    document.getElementById('admin-toggle').classList.remove('active');
    document.getElementById('admin-toggle').textContent = '🔒 管理员';
    showToast('已退出管理员模式');
  } else {
    document.getElementById('admin-modal').classList.add('open');
    setTimeout(() => document.getElementById('admin-pw').focus(), 100);
  }
}

function checkAdmin() {
  const pw = document.getElementById('admin-pw').value;
  if (pw === ADMIN_PASSWORD) {
    isAdmin = true;
    document.body.classList.add('admin-mode');
    document.getElementById('admin-toggle').classList.add('active');
    document.getElementById('admin-toggle').innerHTML = '🔓 管理员';
    closeAdminModal();
    showToast('已进入管理员模式，悬停卡片可删除');
  } else {
    document.getElementById('admin-error').style.display = 'block';
  }
}

function closeAdminModal() {
  document.getElementById('admin-modal').classList.remove('open');
  document.getElementById('admin-pw').value = '';
  document.getElementById('admin-error').style.display = 'none';
}

// ── Modal ─────────────────────────────────────────────────────
function openModal() {
  if (!isConfigured()) { showToast('请先完成 Supabase 设定'); return; }
  resetForm();
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

function resetForm() {
  ['img','pdf'].forEach(k => {
    document.getElementById(k + '-filename').textContent = '';
    const inp = document.getElementById(k + '-file');
    if (inp) inp.value = '';
  });
  document.getElementById('img-caption').value = '';
  document.getElementById('pdf-title').value = '';
  document.getElementById('pdf-desc').value = '';
  document.getElementById('link-url').value = '';
  document.getElementById('link-title').value = '';
  document.getElementById('link-desc').value = '';
  document.getElementById('progress-wrap').style.display = 'none';
  document.getElementById('submit-btn').disabled = false;
  setType('image');
}

// Drag & drop
['img-drop','pdf-drop'].forEach(id => {
  const el = document.getElementById(id);
  el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('dragover'); });
  el.addEventListener('dragleave', () => el.classList.remove('dragover'));
  el.addEventListener('drop', e => {
    e.preventDefault(); el.classList.remove('dragover');
    const file = e.dataTransfer.files[0]; if (!file) return;
    const kind = id === 'img-drop' ? 'img' : 'pdf';
    const dt = new DataTransfer(); dt.items.add(file);
    document.getElementById(kind + '-file').files = dt.files;
    onFileSelect(document.getElementById(kind + '-file'), kind);
  });
});

// Close modal on backdrop click
['modal','admin-modal'].forEach(id => {
  document.getElementById(id).addEventListener('click', e => {
    if (e.target.id === id) {
      id === 'modal' ? closeModal() : closeAdminModal();
    }
  });
});

// ── PDF / Lightbox ────────────────────────────────────────────
function openPdf(src, title) {
  document.getElementById('pdf-title-bar').textContent = title || 'PDF';
  document.getElementById('pdf-frame').src = src;
  document.getElementById('pdf-overlay').classList.add('open');
}
function closePdf() {
  document.getElementById('pdf-overlay').classList.remove('open');
  document.getElementById('pdf-frame').src = '';
}
function openLightbox(src) {
  document.getElementById('lb-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

// ── Toast ─────────────────────────────────────────────────────
function showToast(msg, ms = 2800) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), ms);
}

// ── Escape ────────────────────────────────────────────────────
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                  .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

document.addEventListener('keydown', e => {
  if (e.key !== 'Escape') return;
  closeModal(); closeAdminModal(); closePdf(); closeLightbox();
});

// ── Start ─────────────────────────────────────────────────────
init();
</script>
